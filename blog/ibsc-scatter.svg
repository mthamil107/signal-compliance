<svg viewBox="0 0 640 420" width="100%" height="auto" role="img" aria-labelledby="ttl desc" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif"><title id="ttl">Two failure modes, one picture: resistance vs uptake</title><desc id="desc">Scatter plot of nine AI systems plus an oracle reference. X-axis is Resistance to illegitimate signals (ISR); Y-axis is Uptake of legitimate signals (LSU); both range 0.4 to 1.0. API models are blue, deployed Claude Code agents are amber, oracle is gray. Top-right is strong at both; bottom-right resists attacks but over-refuses legitimate signals, where deployed haiku and sonnet sit.</desc><text x="56" y="19" font-size="15" font-weight="700" fill="#1a1a1a">Two failure modes, one picture: resistance vs uptake</text><g stroke="#e6e6e6" stroke-width="1"><line x1="56" y1="34" x2="56" y2="374"/><line x1="220.7" y1="34" x2="220.7" y2="374"/><line x1="385.3" y1="34" x2="385.3" y2="374"/><line x1="550" y1="34" x2="550" y2="374"/><line x1="56" y1="374" x2="550" y2="374"/><line x1="56" y1="260.7" x2="550" y2="260.7"/><line x1="56" y1="147.3" x2="550" y2="147.3"/><line x1="56" y1="34" x2="550" y2="34"/></g><g font-size="12" fill="#666"><text x="56" y="390" text-anchor="middle">0.4</text><text x="220.7" y="390" text-anchor="middle">0.6</text><text x="385.3" y="390" text-anchor="middle">0.8</text><text x="550" y="390" text-anchor="middle">1.0</text><text x="48" y="378" text-anchor="end">0.4</text><text x="48" y="264.7" text-anchor="end">0.6</text><text x="48" y="151.3" text-anchor="end">0.8</text><text x="48" y="38" text-anchor="end">1.0</text></g><text x="303" y="410" text-anchor="middle" font-size="13" fill="#666">Resistance to illegitimate signals (ISR) →</text><text x="17" y="204" text-anchor="middle" font-size="13" fill="#666" transform="rotate(-90 17 204)">Uptake of legitimate signals (LSU) →</text><g font-size="11" 